<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>strata</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .msg { max-width: 72ch; padding: 0.75rem 1rem; border-radius: 0.5rem; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #1a3a5c; }
  .msg.agent { align-self: flex-start; background: #1a1a1a; border: 1px solid #2a2a2a; }
  .msg.error { align-self: flex-start; background: #3a1a1a; border: 1px solid #5a2a2a; }
  .msg.thinking { opacity: 0.5; }
  #input-bar { display: flex; gap: 0.5rem; padding: 1rem; border-top: 1px solid #222; background: #0a0a0a; }
  #input { flex: 1; padding: 0.75rem 1rem; border: 1px solid #333; border-radius: 0.5rem; background: #111; color: #e0e0e0; font-size: 1rem; font-family: inherit; resize: none; outline: none; }
  #input:focus { border-color: #4a7ab5; }
  #send { padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem; background: #1a3a5c; color: #e0e0e0; font-size: 1rem; cursor: pointer; }
  #send:hover { background: #245080; }
  #send:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { text-align: center; padding: 0.25rem; font-size: 0.8rem; color: #666; }
</style>
</head>
<body>
<div id="messages">
  <div class="status">connected to strata agent</div>
</div>
<div id="input-bar">
  <textarea id="input" rows="1" placeholder="Send a message..." autofocus></textarea>
  <button id="send">Send</button>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
let taskId = null;
let msgId = 1;

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg(text, 'user');
  sendBtn.disabled = true;

  const thinking = addMsg('thinking...', 'agent thinking');

  const params = {
    message: {
      messageId: crypto.randomUUID(),
      role: 'user',
      parts: [{ text }]
    }
  };
  if (taskId) params.taskId = taskId;

  try {
    const resp = await fetch('/a2a', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc: '2.0', id: msgId++, method: 'message/send', params })
    });
    const data = await resp.json();
    thinking.remove();

    if (data.error) {
      addMsg('Error: ' + (data.error.message || JSON.stringify(data.error)), 'error');
    } else if (data.result) {
      taskId = data.result.id || taskId;
      const parts = data.result.status?.message?.parts || [];
      const text = parts.filter(p => p.text).map(p => p.text).join('\n');
      addMsg(text || '(no response)', 'agent');
    }
  } catch (e) {
    thinking.remove();
    addMsg('Network error: ' + e.message, 'error');
  }
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});
</script>
</body>
</html>
